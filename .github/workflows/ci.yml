name: inbar-ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate

  quality-contracts:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv lock --check
      - run: uv sync --group dev --frozen
      - run: git diff --check
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest --cov --cov-report=term-missing
      - run: uv run inbar schemas export
      - run: git diff --exit-code -- protocol/schemas
      - run: uv run inbar schemas check
      - run: uv run inbar mission validate --expect-failure iter001-acquisition-contract
      - name: Verify append-only research memory
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git show "origin/${BASE_REF}:memory/research_engine_extraction.jsonl" > /tmp/base-memory.jsonl
          uv run inbar memory verify-prefix /tmp/base-memory.jsonl
      - name: Reject tracked data, local keys, and credential material
        run: |
          if git ls-files | grep -E '^(data/(raw|derived)/|\.local/)|\.ed25519$'; then
            exit 1
          fi
          if git grep -nE -- 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}'; then
            exit 1
          fi

  compatibility:
    name: compatibility-${{ matrix.os }}-py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python: "3.11"
          - os: ubuntu-24.04
            python: "3.13"
          - os: ubuntu-24.04
            python: "3.14"
          - os: macos-15
            python: "3.12"
          - os: macos-15
            python: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --group dev --frozen --python ${{ matrix.python }}
      - run: uv run --python ${{ matrix.python }} pytest

  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SOURCE_DATE_EPOCH: "315532800"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.11 3.12 3.14
      - run: uv sync --group release --frozen --python 3.12
      - name: Build reproducibly
        run: |
          uv build
          sha256sum dist/* | sed 's#dist/##' > /tmp/build-one.sha256
          mv dist /tmp/build-one
          uv build
          sha256sum dist/* | sed 's#dist/##' > /tmp/build-two.sha256
          diff -u /tmp/build-one.sha256 /tmp/build-two.sha256
      - run: uv run --group release twine check --strict dist/*
      - run: uv run --group release check-wheel-contents dist/*.whl
      - name: Verify isolated wheel on oldest and newest Python
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          uv run --isolated --no-project --python 3.11 --with "$wheel" python -c 'import fieldtrue; print(fieldtrue.__version__)'
          uv run --isolated --no-project --python 3.14 --with "$wheel" inbar --help

  data-extra:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra data --group dev --frozen
      - run: uv run pytest tests/unit/test_adapt.py tests/unit/test_readiness.py

  dependency-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --group security --frozen
      - run: uv export --frozen --no-dev --no-emit-project --output-file /tmp/runtime-requirements.txt
      - run: uv run --group security pip-audit --strict --requirement /tmp/runtime-requirements.txt
